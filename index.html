<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrueServe — 100% Human Web3 Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // ── Block Reown/WalletConnect cloud calls (demo projectId not authorized for this domain) ──
      const BLOCK_HOSTS = ['api.web3modal.org', 'pulse.walletconnect.org', 'rpc.walletconnect.org'];
      const isBlocked = (url) => url && BLOCK_HOSTS.some(h => url.includes(h));

      // Block fetch()
      const _fetch = window.fetch;
      window.fetch = async (...args) => {
        const url = typeof args[0] === 'string' ? args[0] : args[0]?.url;
        if (isBlocked(url)) return new Response('{}', { status: 200, headers: { 'Content-Type': 'application/json' } });
        return _fetch(...args);
      };

      // Block XMLHttpRequest
      const _open = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        if (isBlocked(url)) {
          this._blocked = true;
          return;
        }
        return _open.call(this, method, url, ...rest);
      };
      const _send = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function(...args) {
        if (this._blocked) {
          Object.defineProperty(this, 'status', { value: 200 });
          Object.defineProperty(this, 'responseText', { value: '{}' });
          setTimeout(() => {
            this.dispatchEvent(new Event('load'));
            this.dispatchEvent(new Event('loadend'));
          }, 0);
          return;
        }
        return _send.call(this, ...args);
      };

      // Block sendBeacon
      navigator.sendBeacon = () => true;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
